server:
  port: 9002
spring:
  boot:
    admin:
      client:
         url: http://localhost:7779
  application:
    name: shopping-web
feign:
  circuitbreaker:
    enabled: true
resilience4j:
  circuitbreaker:
    instances:
          shopping-user:
            register-health-indicator: true   # 让断路器状态出现在 /actuator/health
    metrics:
      enabled: true
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
eureka:
  client:
    register-with-eureka: true # 作为客户端需要注册到Eureka
    fetch-registry: true  # 作为客户端需要从Eureka获取注册信息
    service-url: # 客户端注册地址
      defaultZone: http://localhost:8888/eureka
  instance:
  # 优先使用该服务的IP地址注册到Eureka，在生产环境建议改为true
     prefer-ip-address: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
